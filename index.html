<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dejavu Comfort | Premium Footwear</title>
    <style>
        :root {
            --bg-white: #ffffff;
            --gold-accent: #D4AF37;
            --text-black: #222222;
            --light-gray: #f8f8f8;
            --transition: all 0.3s ease;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-white);
            color: var(--text-black);
            line-height: 1.6;
        }

        /* الهيدر المتوسط الاحترافي */
        header {
            background-color: var(--bg-white);
            padding: 25px 15px;
            text-align: center;
            border-bottom: 2px solid var(--gold-accent);
            position: sticky;
            top: 0; z-index: 100;
        }

        header h1 {
            color: var(--gold-accent);
            margin: 0 0 10px 0;
            font-size: 32px;
            letter-spacing: 6px;
            text-transform: uppercase;
        }

        nav a {
            text-decoration: none;
            color: var(--text-black);
            margin: 0 12px;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            transition: var(--transition);
        }

        nav a:hover { color: var(--gold-accent); }

        /* تنسيق الـ Badge */
        .color-badge {
            position: absolute;
            top: 15px; right: 15px;
            background: rgba(255, 255, 255, 0.9);
            color: #222;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            border: 1px solid var(--gold-accent);
            z-index: 6;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .collection-section { padding: 40px 20px; max-width: 1200px; margin: 0 auto; }
        .collection-section h2 { text-align: center; color: var(--gold-accent); margin-bottom: 40px; }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: white;
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            transition: var(--transition);
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.1);
            border-color: var(--gold-accent);
        }

        .product-img {
            position: relative;
            width: 100%; height: 240px;
            overflow: hidden;
            border-radius: 8px;
            background: #fafafa;
            margin-bottom: 15px;
        }

        .image-slider { display: flex; transition: transform 0.4s ease; height: 100%; }
        .image-slider img { min-width: 100%; height: 100%; object-fit: contain; }

        .slider-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(212, 175, 55, 0.7);
            color: white; border: none; padding: 6px 9px;
            cursor: pointer; z-index: 5; border-radius: 50%; font-size: 12px;
        }
        .prev { left: 5px; } .next { right: 5px; }

        .product-title { font-size: 18px; font-weight: bold; margin: 10px 0 5px; }
        .product-category { color: #888; font-size: 12px; text-transform: uppercase; margin-bottom: 15px; }

        .view-btn {
            background: transparent;
            color: var(--text-black);
            border: 2px solid var(--gold-accent);
            padding: 10px; font-weight: bold;
            cursor: pointer; border-radius: 6px;
            width: 100%; transition: var(--transition);
        }
        .view-btn:hover { background: var(--gold-accent); color: white; }

        /* المودال */
        .modal {
            display: none; position: fixed;
            z-index: 1000; left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
        }
        .modal-content {
            background: white; margin: 10% auto; padding: 30px;
            border-radius: 15px; width: 85%; max-width: 400px;
            text-align: center; position: relative; border-top: 5px solid var(--gold-accent);
        }
        .close-modal { position: absolute; right: 15px; top: 10px; font-size: 24px; cursor: pointer; color: #999; }
        .price-tag { font-size: 24px; font-weight: bold; color: #222; margin: 15px 0; }

        footer { background: #111; color: white; text-align: center; padding: 25px; margin-top: 50px; }
        footer span { color: var(--gold-accent); }
    </style>
</head>
<body>

    <header>
        <h1>Dejavu</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#collection">Collection</a>
            <a href="#">Shop</a>
        </nav>
    </header>

    <section id="collection" class="collection-section">
        <h2>Our Premium Collection</h2>
        <div class="grid-container" id="productGrid">
            </div>
    </section>

    <div id="detailsModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2 id="modalTitle"></h2>
            <p id="modalDescription"></p>
            <div id="modalPrice" class="price-tag"></div>
            <button class="view-btn" style="background: var(--gold-accent); color: white;">Order Now</button>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 <span>Dejavu Comfort</span> | Step into Luxury</p>
    </footer>

    <script>
        // مصفوفة البيانات: عدل هنا فقط لكل منتج
        const products = [
            { id: 1, title: "Product 1", cat: "Sneakers", price: "1,250", desc: "وصف المنتج رقم 1 هنا...", colors: ["Beige", "Black"], imgs: ["img1_1.webp", "img1_2.webp"] },
            { id: 2, title: "Product 2", cat: "Sandals", price: "950", desc: "وصف المنتج رقم 2 هنا...", colors: ["Tan", "White"], imgs: ["img2_1.webp", "img2_2.webp"] },
            { id: 3, title: "Product 3", cat: "Sneakers", price: "1,100", desc: "وصف المنتج رقم 3 هنا...", colors: ["Blue", "Grey"], imgs: ["img3_1.webp", "img3_2.webp"] },
            { id: 4, title: "Product 4", cat: "Classic", price: "1,400", desc: "وصف المنتج رقم 4 هنا...", colors: ["Black"], imgs: ["img4_1.webp"] },
            { id: 5, title: "Product 5", cat: "Sneakers", price: "1,250", desc: "وصف المنتج رقم 5...", colors: ["White"], imgs: ["img5_1.webp"] },
            { id: 6, title: "Product 6", cat: "Sandals", price: "800", desc: "وصف المنتج رقم 6...", colors: ["Gold"], imgs: ["img6_1.webp"] },
            { id: 7, title: "Product 7", cat: "Sneakers", price: "1,300", desc: "وصف المنتج رقم 7...", colors: ["Red"], imgs: ["img7_1.webp"] },
            { id: 8, title: "Product 8", cat: "Classic", price: "1,500", desc: "وصف المنتج رقم 8...", colors: ["Brown"], imgs: ["img8_1.webp"] },
            { id: 9, title: "Product 9", cat: "Sneakers", price: "1,150", desc: "وصف المنتج رقم 9...", colors: ["Pink"], imgs: ["img9_1.webp"] },
            { id: 10, title: "Product 10", cat: "Sandals", price: "900", desc: "وصف المنتج رقم 10...", colors: ["Silver"], imgs: ["img10_1.webp"] },
            { id: 11, title: "Product 11", cat: "Sneakers", price: "1,200", desc: "وصف المنتج رقم 11...", colors: ["Green"], imgs: ["img11_1.webp"] },
            { id: 12, title: "Product 12", cat: "Classic", price: "1,600", desc: "وصف المنتج رقم 12...", colors: ["Navy"], imgs: ["img12_1.webp"] },
            { id: 13, title: "Product 13", cat: "Sneakers", price: "1,250", desc: "وصف المنتج رقم 13...", colors: ["Beige"], imgs: ["img13_1.webp"] },
            { id: 14, title: "Product 14", cat: "Sandals", price: "850", desc: "وصف المنتج رقم 14...", colors: ["Multi"], imgs: ["img14_1.webp"] }
        ];

        // وظيفة بناء الكاردات تلقائياً
        const grid = document.getElementById('productGrid');
        products.forEach(p => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <div class="product-img">
                    <div class="color-badge">${p.colors[0]}</div>
                    ${p.imgs.length > 1 ? `
                        <button class="slider-btn prev" onclick="changeImage(this, -1)">&#10094;</button>
                        <button class="slider-btn next" onclick="changeImage(this, 1)">&#10095;</button>
                    ` : ''}
                    <div class="image-slider">
                        ${p.imgs.map((img, i) => `<img src="${img}" alt="${p.colors[i] || p.colors[0]}">`).join('')}
                    </div>
                </div>
                <div class="product-title">${p.title}</div>
                <div class="product-category">${p.cat}</div>
                <div class="product-price" style="display:none;">EGP ${p.price}</div>
                <p class="product-description" style="display:none;">${p.desc}</p>
                <button class="view-btn">View Details</button>
            `;
            grid.appendChild(card);
        });

        // سكريبت التقليب
        function changeImage(btn, dir) {
            const slider = btn.parentElement.querySelector('.image-slider');
            const badge = btn.parentElement.querySelector('.color-badge');
            const imgs = slider.querySelectorAll('img');
            let idx = parseInt(slider.getAttribute('data-idx') || 0);
            idx = (idx + dir + imgs.length) % imgs.length;
            slider.setAttribute('data-idx', idx);
            slider.style.transform = `translateX(${-idx * 100}%)`;
            if(badge) badge.innerText = imgs[idx].getAttribute('alt');
        }

        // سكريبت المودال
        const modal = document.getElementById("detailsModal");
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('view-btn') && !e.target.closest('.modal-content')) {
                const card = e.target.closest('.product-card');
                document.getElementById("modalTitle").innerText = card.querySelector(".product-title").innerText;
                document.getElementById("modalDescription").innerText = card.querySelector(".product-description").innerText;
                document.getElementById("modalPrice").innerText = card.querySelector(".product-price").innerText;
                modal.style.display = "block";
            }
        });
        document.querySelector(".close-modal").onclick = () => modal.style.display = "none";
        window.onclick = (e) => { if (e.target == modal) modal.style.display = "none"; }
    </script>
</body>
</html>
