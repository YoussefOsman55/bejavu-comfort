<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dejavu Comfort | Premium Footwear</title>
    <style>
        :root {
            --bg-white: #ffffff;
            --gold-accent: #D4AF37;
            --text-black: #222222;
            --light-gray: #f8f8f8;
            --transition: all 0.3s ease;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-white);
            color: var(--text-black);
            line-height: 1.6;
        }

       /* التعديل الجديد لتوسط اللوجو */
header {
    background-color: var(--bg-white);
    padding: 20px 50px;
    display: flex;
    flex-direction: column; /* يخلي اللوجو فوق والمنيو تحت */
    align-items: center;    /* يوسط كل حاجة في النص */
    gap: 15px;             /* مسافة بين الكلمة والمنيو */
    border-bottom: 2px solid var(--gold-accent);
    position: sticky;
    top: 0;
    z-index: 100;
}

header h1 {
    color: var(--gold-accent);
    margin: 0;
    font-size: 35px;        /* كبرنا الخط شوية عشان يبقى أوضح في النص */
    letter-spacing: 5px;    /* زودنا المسافات بين الحروف لشكل أشيك */
    text-transform: uppercase;
    text-align: center;
}

nav {
    margin: 0;             /* شيلنا الـ margin عشان نضمن التوسط */
}

nav a {
    text-decoration: none;
    color: var(--text-black);
    margin: 0 15px;        /* توزيع متساوي للمنيو */
    font-weight: 600;
    transition: var(--transition);
}
        }

        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); border-color: var(--gold-accent); }

        .product-img { position: relative; width: 100%; height: 220px; overflow: hidden; border-radius: 8px; margin-bottom: 15px; background: #fafafa; }
        .image-slider { display: flex; transition: transform 0.4s ease-in-out; height: 100%; }
        .image-slider img { min-width: 100%; height: 100%; object-fit: contain; }

        .color-badge {
            position: absolute; top: 10px; right: 10px;
            background: rgba(255, 255, 255, 0.9); color: #222; padding: 3px 10px;
            border-radius: 15px; font-size: 11px; font-weight: bold; border: 1px solid var(--gold-accent); z-index: 6;
        }

        .slider-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(212, 175, 55, 0.7); color: white; border: none;
            width: 30px; height: 30px; cursor: pointer; z-index: 5; border-radius: 50%; font-size: 12px;
        }
        .prev { left: 5px; } .next { right: 5px; }

        .product-title { font-size: 18px; font-weight: bold; margin-bottom: 5px; }
        .view-btn {
            background: transparent; color: var(--text-black); border: 2px solid var(--gold-accent);
            padding: 10px; font-weight: bold; cursor: pointer; border-radius: 6px; width: 100%; transition: var(--transition);
        }
        .view-btn:hover { background: var(--gold-accent); color: white; }

        /* --- التحسين الجذري للنافذة المنبثقة (MODAL) --- */
        .modal {
            display: none; position: fixed; z-index: 2000; 
            left: 0; top: 0; width: 100%; height: 100%; 
            background-color: rgba(0, 0, 0, 0.6); 
            backdrop-filter: blur(4px);
            display: none; align-items: center; justify-content: center; /* لتوسيط المحتوى */
        }

        .modal-content {
            background-color: white; 
            padding: 30px; 
            border-radius: 20px; 
            width: 90%; 
            max-width: 400px; /* حجم مثالي وملموم */
            text-align: center; 
            position: relative; 
            border-top: 6px solid var(--gold-accent);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: modalAppear 0.3s ease-out;
        }

        @keyframes modalAppear {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .close-modal { 
            position: absolute; right: 15px; top: 10px; 
            font-size: 24px; cursor: pointer; color: #bbb; 
            transition: 0.2s;
        }
        .close-modal:hover { color: var(--text-black); }

        #modalTitle { color: var(--text-black); font-size: 22px; margin-bottom: 15px; }
        #modalDescription { color: #666; font-size: 14px; margin-bottom: 20px; }
        .price-tag { font-size: 26px; font-weight: 800; margin: 15px 0; color: var(--gold-accent); }
        
        .add-to-cart-btn {
            background: var(--gold-accent); color: white; border: none;
            padding: 15px; font-weight: bold; cursor: pointer; border-radius: 8px; 
            width: 100%; font-size: 16px; letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        footer { background: #111; color: white; text-align: center; padding: 20px; font-size: 12px; }
    </style>
</head>
<body>

    <header>
        <h1> Dejavu </h1>
    </header>

    <section id="collection" class="collection-section">
        <div class="grid-container">
            <!-- الكارد رقم 1 (كمثال) -->
            <div class="product-card">
                <div class="product-img">
                    <div class="color-badge">Beige</div>
                    <button class="slider-btn prev" onclick="changeImage(this, -1)">&#10094;</button>
                    <button class="slider-btn next" onclick="changeImage(this, 1)">&#10095;</button>
                    <div class="image-slider">
                        <img src="che-djtx-011-beige-1.webp" alt="Beige">
                        <img src="che-djtx-011-black-1.webp" alt="Black">
                        <img src="che-djtx-011-nude-1.webp" alt="Nude">
                    </div>
                </div>
                <div class="product-title">Active Cloud Sneaker</div>
                <button class="view-btn">View Details</button>
            </div>

            <!-- كرر هذا الكارد لـ 14 منتج مع تغيير الصور والأسماء -->
            <!-- سأضع لك كارد فارغ للتكرار السريع -->
            <script>
                // لعمل 13 كارد إضافي بسرعة للشكل فقط
                for(let i=2; i<=14; i++) {
                    document.write(`
                    <div class="product-card">
                        <div class="product-img">
                            <div class="color-badge">Color 1</div>
                            <button class="slider-btn prev" onclick="changeImage(this, -1)">&#10094;</button>
                            <button class="slider-btn next" onclick="changeImage(this, 1)">&#10095;</button>
                            <div class="image-slider">
                                <img src="" alt="Color 1"><img src="" alt="Color 2">
                            </div>
                        </div>
                        <div class="product-title">Premium Shoes ${i}</div>
                        <button class="view-btn">View Details</button>
                    </div>
                    `);
                }
            </script>
        </div>
    </section>

    <!-- النافذة المنبثقة (Modal) -->
    <div id="detailsModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2 id="modalTitle">Active Cloud Sneaker</h2>
            <p id="modalDescription">Crafted with premium materials for maximum durability and effortless style. Features an ergonomic sole designed for long-lasting comfort.</p>
            <div class="price-tag">EGP 1,250</div>
            <button class="add-to-cart-btn">ADD TO CART</button>
        </div>
    </div>

    <footer><p>&copy; 2026 Dejavu Comfort | Premium Footwear</p></footer>

    <script>
        // فانكشن تقليب الصور
        function changeImage(btn, direction) {
            const slider = btn.parentElement.querySelector('.image-slider');
            const badge = btn.parentElement.querySelector('.color-badge');
            const images = slider.querySelectorAll('img');
            let currentIndex = slider.getAttribute('data-index') ? parseInt(slider.getAttribute('data-index')) : 0;
            
            currentIndex += direction;
            if (currentIndex >= images.length) currentIndex = 0;
            if (currentIndex < 0) currentIndex = images.length - 1;
            
            slider.setAttribute('data-index', currentIndex);
            slider.style.transform = `translateX(${-currentIndex * 100}%)`;
            if (badge) badge.innerText = images[currentIndex].getAttribute('alt');
        }

        // تحكم النافذة المنبثقة
        const modal = document.getElementById("detailsModal");
        const closeModalBtn = document.querySelector(".close-modal");

        document.addEventListener('click', function (e) {
            if (e.target && e.target.classList.contains('view-btn')) {
                const card = e.target.closest('.product-card');
                document.getElementById("modalTitle").innerText = card.querySelector(".product-title").innerText;
                modal.style.display = "flex"; // استخدام flex للتوسيط
            }
        });

        closeModalBtn.onclick = () => modal.style.display = "none";
        window.onclick = (event) => { if (event.target == modal) modal.style.display = "none"; }
    </script>
</body>
</html>
